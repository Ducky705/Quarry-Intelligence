name: Daily Quarry Pipeline

on:
  schedule:
    - cron: '0 9 * * *' # 9:00 AM UTC daily
  workflow_dispatch:
    inputs:
      full_run:
        description: 'Run full historical simulation'
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [trigger-pipeline] # 👈 Best Practice: Allows Scrapper to trigger this via API

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          submodules: false # 👈 We handle this manually to prevent auth overrides
          fetch-depth: 0

      - name: Submodule Force-Auth
        run: |
          git submodule set-url models https://x-access-token:${{ secrets.GH_PAT }}@github.com/Ducky705/XGBoost-Sniper-Models.git
          git submodule sync
          git submodule update --init --recursive
          echo "✅ Submodules force-authenticated and updated."

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfreetype6-dev libpng-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Data Lake
        uses: actions/cache@v4
        with:
          path: data/
          # 👈 Best Practice: Key includes Run ID to ensure updated parquet is ALWAYS saved back
          key: ${{ runner.os }}-quarry-data-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-quarry-data-

      - name: Run Unified Daily Update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # The script handles days logic internally or via cached fetch
          python3 scripts/daily_update.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "QuarryBot"
          git config --global user.email "bot@quarry.institutional"
          
          # Add all modified files: docs, reports, assets
          git add docs/ README.md LATEST_ACTION.md assets/
          
          if [[ -z $(git status -s) ]]; then
            echo "No changes to commit."
          else
            git commit -m "📈 Auto-Update: Daily Pipeline Sync [$(date +'%Y-%m-%d')]"
            
            # 👈 Best Practice: Pull rebase to handle race conditions with manual pushes
            git pull --rebase origin main
            
            # Use GH_PAT for push authentication to trigger subsequent workflows (like website deployment)
            git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
            git push
          fi

